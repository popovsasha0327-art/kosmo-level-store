<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMLSH | Главный Штаб</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007aff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        /* НАВИГАЦИЯ */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .site-name { font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; margin-left: 25px; transition: 0.3s; font-size: 14px; }
        .nav-link:hover, .nav-link.active { color: var(--primary); }

        /* ИНТЕРФЕЙС ЧАТА */
        #ai-interface {
            position: fixed; bottom: 100px; right: 30px; width: 350px;
            background: rgba(20, 20, 30, 0.95); border: 1px solid var(--border);
            border-radius: 20px; backdrop-filter: blur(25px); z-index: 4000;
            display: flex; flex-direction: column; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ai-hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
        .ai-header { padding: 15px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; }
        #chat-history { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 15px; display: flex; gap: 10px; }
        .input-area input { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 10px; outline: none; }

        /* СЦЕНА СИЛЫ */
        #oracle-scene {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .scene-hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .scene-overlay { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); }
        .scene-content { position: relative; z-index: 10001; text-align: center; max-width: 800px; padding: 20px; }
        #scene-answer { 
            font-size: 2.8rem; font-weight: 600; 
            background: linear-gradient(to bottom, #fff, #777); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-top: 20px;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; z-index: 5000;
        }
        .quick-input {
            width: 100%; padding: 18px 30px; border-radius: 50px;
            background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            backdrop-filter: blur(30px); color: white; text-align: center;
            outline: none; transition: 0.3s; cursor: help;
        }
        .quick-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .close-btn { 
            margin-top: 50px; padding: 12px 35px; border-radius: 30px; 
            border: 1px solid var(--border); background: none; color: white; cursor: pointer; transition: 0.3s;
        }
        .close-btn:hover { background: white; color: black; }
    </style>
</head>
<body>
    <div class="main-bg"></div>

    <nav class="top-nav">
        <div class="nav-left"><span class="site-name">LMLSH HQ</span></div>
        <div class="nav-right">
            <a href="index.html" class="nav-link active">Главная</a>
            <a href="about.html" class="nav-link">О нас</a>
            <span class="nav-link" onclick="toggleAI()" style="cursor:pointer">Оракул</span>
        </div>
    </nav>

    <div id="oracle-scene" class="scene-hidden">
        <div class="scene-overlay"></div>
        <div class="scene-content">
            <h2 id="scene-status" style="color:var(--primary); letter-spacing: 4px; font-size: 14px;">ОРАКУЛ ВЕЩАЕТ</h2>
            <div id="scene-answer">...</div>
            <button class="close-btn" onclick="closeScene()">ВЕРНУТЬСЯ В ШТАБ</button>
        </div>
    </div>

    <div id="ai-interface" class="ai-hidden">
        <div class="ai-header">
            <span>ORACLE MINI</span>
            <span onclick="toggleAI()" style="cursor:pointer">×</span>
        </div>
        <div id="chat-history"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Вопрос...">
            <button onclick="sendNormal()" style="background:var(--primary); border:none; color:white; padding:5px 15px; border-radius:8px; cursor:pointer">⬆</button>
        </div>
    </div>

    <div class="bottom-bar">
        <input type="text" class="quick-input" id="quick-input" placeholder="Спросить Оракула (Правый Клик)" oncontextmenu="handlePower(event)">
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwTGRx7v4Ri2r_3xMYeN873BdldGY2Lh2u7LpvJX9NKGNjmOsJNOLh-G-n9DulkLJbjHg/exec";

        function toggleAI() { document.getElementById('ai-interface').classList.toggle('ai-hidden'); }

        async function handlePower(e) {
            e.preventDefault();
            const input = document.getElementById('quick-input');
            const query = input.value.trim();
            if(!query) return;

            const scene = document.getElementById('oracle-scene');
            const answer = document.getElementById('scene-answer');
            
            scene.classList.remove('scene-hidden');
            answer.innerText = "Думаю...";
            input.value = "";

            try {
                const r = await fetch(`${API}?q=${encodeURIComponent(query)}`);
                const d = await r.json();
                answer.innerText = d.answer;
            } catch(err) { answer.innerText = "Ошибка связи с космосом."; }
        }

        function closeScene() { document.getElementById('oracle-scene').classList.add('scene-hidden'); }

        async function sendNormal() {
            const input = document.getElementById('user-input');
            const hist = document.getElementById('chat-history');
            const text = input.value.trim();
            if(!text) return;

            hist.innerHTML += `<div><b>Вы:</b> ${text}</div>`;
            input.value = "";
            
            const r = await fetch(`${API}?q=${encodeURIComponent(text)}`);
            const d = await r.json();
            hist.innerHTML += `<div style="color:var(--primary)"><b>Оракул:</b> ${d.answer}</div>`;
            hist.scrollTop = hist.scrollHeight;
        }
    </script>
</body>
</html>
