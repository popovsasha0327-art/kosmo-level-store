<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMLSH | Главный Штаб</title>
    <link rel="stylesheet" href="main-prestige.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-bg"></div>

    <nav class="top-nav">
        <div class="nav-left"><span class="site-name">LMLSH</span></div>
        <div class="nav-right">
            <div class="ai-trigger-container" onclick="toggleAI()">
                <div class="ai-icon-mini">
                    <div class="dot d1"></div>
                    <div class="dot d2"></div>
                </div>
                <span class="ai-hint">Спросить Оракула</span>
            </div>
            <a href="index.html" class="nav-link active">Главная</a>
            <a href="about.html" class="nav-link">О нас</a>
        </div>
    </nav>

    <div id="ai-interface" class="ai-hidden">
        <div class="ai-header" id="drag-header">
            <div class="ai-logo-container">
                <div class="circle c1"></div>
                <div class="circle c2"></div>
            </div>
            <span class="header-title">LMLSH ORACLE</span>
            <div class="minimize-btn" onclick="toggleAI()">−</div>
        </div>
        <div id="chat-history"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Введите вопрос..." autocomplete="off">
            <button id="send-btn">⬆</button>
        </div>
    </div>

    <div id="oracle-scene" class="scene-hidden">
        <div class="scene-overlay"></div>
        <div class="scene-content">
            <div class="scene-loader" id="scene-loader"></div>
            <h1 id="scene-text">Оракул слушает...</h1>
            <p id="scene-answer"></p>
            <button class="close-scene-btn" onclick="closeScene()">Вернуться в Штаб</button>
        </div>
    </div>

    <div class="oracle-bottom-bar">
        <input type="text" id="oracle-quick-input" placeholder="Спросить Оракула (Правая Кнопка Силы)..." oncontextmenu="handleRightClick(event)" autocomplete="off">
    </div>

    <script src="brain.js"></script>
</body>
</html>
