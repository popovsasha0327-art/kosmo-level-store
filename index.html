<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ORACLE PRESTIGE 2.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="main-frame">
        <div class="top-bar" id="drag-handle">
            <button class="icon-btn" onclick="openLogin()" title="Вход в аккаунт">👤</button>
            <div id="chat-title">Штаб Посейдона</div>
            <div class="top-actions">
                <button class="icon-btn" onclick="location.reload()">🔄</button>
                <button class="icon-btn" onclick="clearChat()">🗑️</button>
            </div>
        </div>

        <h2 id="ai-head">О привет, Посейдон!</h2>

        <div id="chat">
            <div class="bubble ai">Система 2.9. Модуль перемещения активен. Вход через иконку профиля слева.</div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <button class="action-btn" onclick="attachFile()" title="Прикрепить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; transform: rotate(45deg);"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <input type="text" id="ai-q" placeholder="Сообщение..." autocomplete="off">
                <button class="send-btn" onclick="ask()">↑</button>
            </div>
            
            <div class="modes-shelf">
                <button class="mode-tag active" onclick="setMode('fast', this)">Быстрая</button>
                <button class="mode-tag" onclick="setMode('ultra', this)">Думающая</button>
                <button class="mode-tag" onclick="setMode('scan', this)">Анализ</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
