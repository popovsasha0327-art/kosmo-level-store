<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LMSH | Эпицентр</title>
    <link rel="stylesheet" href="main-prestige.css">
</head>
<body>

    <main id="app-content">
        <h2 style="padding: 20px; text-align: center;">🚀 Мой Эпицентр</h2>
    </main>

    <div id="oracle-window" class="oracle-popup">
        <div class="oracle-header">
            <span>🔮 Оракул: Эпицентр</span>
            <button onclick="toggleOracle()" class="close-btn">×</button>
        </div>
        <div id="chat-box" class="chat-area"></div>
        <div id="status-bar" class="status-line">🚀 В Эпицентр: Жду команду...</div>
    </div>

    <div class="bottom-bar">
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Спросить Оракула..." onkeypress="if(event.key==='Enter') sendToOracle()">
            <button onclick="sendToOracle()" class="send-btn">➔</button>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
