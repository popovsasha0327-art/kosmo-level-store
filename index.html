<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ORACLE PRESTIGE 2.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="main-frame">
        <div class="top-bar">
            <button class="icon-btn" onclick="newChat()" title="Новый чат">+</button>
            <div id="chat-title">Главный Штаб</div>
            <div class="top-actions">
                <button class="icon-btn" onclick="deleteChat()" title="Удалить">🗑️</button>
            </div>
        </div>

        <h2 id="ai-head">О привет, Посейдон! Чем займемся?</h2>

        <div id="chat">
            <div class="bubble ai">Система готова. Ожидаю указаний в Секторе 3.2...</div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <button class="action-btn" onclick="takeSnapshot()">📸</button>
                <input type="text" id="ai-q" placeholder="Сообщение..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="ask()">↑</button>
            </div>
            
            <div class="modes-shelf">
                <button class="mode-tag active" onclick="setMode('fast', this)">Быстрая</button>
                <button class="mode-tag" onclick="setMode('ultra', this)">Думающая</button>
                <button class="mode-tag" onclick="setMode('scan', this)">Анализ</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
