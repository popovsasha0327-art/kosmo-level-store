<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMLSH | Oracle Floating</title>
    <link rel="stylesheet" href="main-prestige.css">
    <link rel="stylesheet" href="oracle-boarding.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-bg"></div>

    <div id="ai-interface">
        <div class="ai-header">
            <div class="ai-logo-container">
                <div class="circle c1"></div>
                <div class="circle c2"></div>
            </div>
            <span>LMLSH ORACLE</span>
        </div>

        <div id="chat-history">
            <div class="msg ai">Система активирована. Enter включен. Жду файлы или вопросы, Саня.</div>
        </div>

        <div class="input-area">
            <label for="file-input" class="attach-btn">📎</label>
            <input type="file" id="file-input" style="display:none">
            
            <input type="text" id="user-input" placeholder="Напиши что-нибудь..." autocomplete="off">
            <button id="send-btn">⬆</button>
        </div>
    </div>

    <div id="cookie-popup" class="ios-sheet">
        <p>Разрешить использование Cookies?</p>
        <div class="sheet-buttons">
            <button onclick="acceptCookies()">Разрешить</button>
            <button onclick="triggerMammoth()">Отклонить</button>
        </div>
    </div>

    <div id="lock-screen" class="hidden">
        <div class="blur-overlay"></div>
    </div>

    <script src="app-logic.js"></script>
    <script src="brain.js"></script>
</body>
</html>
