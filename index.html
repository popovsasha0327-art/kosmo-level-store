<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE TITAN 3.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ai-trigger" onclick="toggleOracle()">
        <div class="trigger-bg"></div>
        <span class="dot left-dot">●</span>
        <span class="dot right-dot">●</span>
    </div>

    <div class="card" id="oracle-window" style="display: none;">
        <div class="top-bar" id="drag-handle">
            <div class="status-dot"></div>
            <div id="chat-title">ORACLE TITAN</div>
            <button class="close-btn" onclick="toggleOracle()">×</button>
        </div>
        
        <div id="chat">
            <div class="bubble ai">Система 3.2 онлайн. Навигация синхронизирована. Жду приказов, Посейдон.</div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <button class="action-btn" onclick="attachFile()">📎</button>
                <input type="text" id="ai-q" placeholder="Команда..." autocomplete="off">
                <button class="send-btn" onclick="ask()">↑</button>
            </div>
            <div class="modes-shelf">
                <button class="mode-tag active" onclick="setMode('fast', this)">Быстрая</button>
                <button class="mode-tag" onclick="setMode('ultra', this)">Думающая</button>
                <button class="mode-tag" onclick="setMode('scan', this)">Анализ</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
