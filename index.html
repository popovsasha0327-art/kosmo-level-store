<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ORACLE PRESTIGE 2.6</title>
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="card" id="main-frame">
        <div class="top-bar">
            <button class="icon-btn" onclick="location.reload()" title="Обновить">🔄</button>
            <div id="chat-title">Штаб Посейдона</div>
            <div class="top-actions">
                <button class="icon-btn" onclick="alert('Чат очищен!')" title="Удалить">🗑️</button>
            </div>
        </div>

        <h2 id="ai-head">О привет, Посейдон!</h2>

        <div id="chat">
            <div class="bubble ai">Связь с ЛМСХ-Клетками установлена. Неон прогрет на 100%. Жду приказа!</div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <button class="action-btn" onclick="takeSnapshot()">📸</button>
                <input type="text" id="ai-q" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')ask()">
                <button class="send-btn" onclick="ask()">↑</button>
            </div>
            
            <div class="modes-shelf">
                <button class="mode-tag active" onclick="setMode('fast', this)">Быстрая</button>
                <button class="mode-tag" onclick="setMode('ultra', this)">Думающая</button>
                <button class="mode-tag" onclick="setMode('scan', this)">Анализ</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
