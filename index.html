<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN | ГЛАВНАЯ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">TITAN 3.5.4</div>
        <div class="nav-links">
            <a href="index.html" class="active">ГЛАВНАЯ</a>
            <a href="about.html">О СИСТЕМЕ</a>
        </div>
    </nav>

    <div class="content">
        <h1>ЦЕНТРАЛЬНЫЙ СЕКТОР</h1>
        <p>Добро пожаловать в Штаб, Посейдон. Все системы активны.</p>
    </div>

    <div id="ai-trigger" onclick="toggleOracle()">
        <span class="dot left-dot">●</span>
        <span class="dot right-dot">●</span>
    </div>

    <div class="card" id="oracle-window">
        <div class="top-bar" id="drag-handle">
            <div style="width: 20px;"></div>
            <div id="chat-title">ШТАБ ПОСЕЙДОНА</div>
            <button class="close-btn" onclick="toggleOracle()">×</button>
        </div>
        
        <div id="chat">
            <div class="bubble ai" id="welcome-msg">Инициализация систем ЛМСХ...</div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <button class="action-btn" onclick="attachFile()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="width:20px; transform: rotate(45deg);">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <input type="text" id="ai-q" placeholder="Командуй..." autocomplete="off">
                <button class="send-btn" onclick="ask()">↑</button>
            </div>
            
            <div class="modes-shelf">
                <button class="mode-tag fast active" onclick="setMode('fast', this)">БЫСТРАЯ</button>
                <button class="mode-tag ultra" onclick="setMode('ultra', this)">ДУМАЮЩАЯ</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
</body>
</html>
